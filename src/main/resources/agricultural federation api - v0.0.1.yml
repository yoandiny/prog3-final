openapi: 3.1.0
info:
  title: Agricultural Federation API
  description: |
    # VERSIONING
    This API uses semantic versioning (MAJOR.MINOR.PATCH).
    
    # FEATURES
    Comprehensive API for managing the Agricultural Federation of Madagascar, including:
    - Collectivities and Member management
    - Treasury (Bank and Mobile Money accounts)
    - Activities and Attendance
    - Statistics and Reports
  version: 0.1.0
servers:
  - url: 'https://localhost:8080'
paths:
  '/collectivities':
    post:
      summary: Create list of collectivities
      tags: [Collectivities]
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateCollectivity'
      responses:
        201:
          description: List of created collectivities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivity'

  '/collectivities/{id}/identity':
    patch:
      summary: Assign number and unique name to a collectivity
      description: |
        Assigns a unique identification number and name to a collectivity.
        Once assigned, these cannot be changed.
      tags: [Collectivities]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [number, name]
              properties:
                number:
                  type: string
                name:
                  type: string
      responses:
        200:
          description: Identity assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
        400:
          description: Bad Request (e.g., identity already assigned)
        404:
          description: Collectivity not found
        409:
          description: Conflict (e.g., name or number already exists)

  '/members':
    post:
      summary: Register new members
      description: |
        Admission requires at least 2 sponsors. 
        Registration fee (50,000 MGA) and annual dues must be paid.
      tags: [Members]
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateMember'
      responses:
        201:
          description: Created members
        400:
          description: Validation error (Insufficient sponsors, missing payment, etc.)

  '/treasury/accounts':
    get:
      summary: List financial accounts
      parameters:
        - name: ownerId
          in: query
          required: false
          schema:
            type: integer
        - name: ownerType
          in: query
          schema:
            $ref: '#/components/schemas/EntityType'
      tags: [Treasury]
      responses:
        200:
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'

  '/activities':
    post:
      summary: Create an activity (AGM, Training, etc.)
      tags: [Activities]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Activity'
      responses:
        201:
          description: Activity created

  '/activities/{id}/attendance':
    post:
      summary: Register member attendance
      tags: [Activities]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AttendanceRecord'
      responses:
        200:
          description: Attendance registered

  '/statistics':
    get:
      summary: Get federation statistics
      tags: [Reports]
      parameters:
        - name: collectivityId
          in: query
          required: false
          schema:
            type: integer
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        200:
          description: Statistics report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatisticsReport'

components:
  schemas:
    EntityType:
      type: string
      enum: [FEDERATION, COLLECTIVITY]

    CreateCollectivity:
      type: object
      required: [city]
      properties:
        number:
          type: string
        name:
          type: string
        specialty:
          type: string
        city:
          type: string
        annualFee:
          type: number

    Collectivity:
      allOf:
        - $ref: '#/components/schemas/CreateCollectivity'
        - type: object
          properties:
            id:
              type: integer

    CreateMember:
      required: [firstName, lastName, email, sponsors]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          type: string
          enum: [MALE, FEMALE]
        address:
          type: string
        profession:
          type: string
        sponsors:
          type: array
          items:
            $ref: '#/components/schemas/SponsorshipInput'
        admissionFeePaid:
          type: boolean
        annualFeePaid:
          type: boolean

    SponsorshipInput:
      type: object
      properties:
        sponsorId:
          type: integer
        relationNature:
          type: string

    Account:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [CASH, BANK, MOBILE_MONEY]
        balance:
          type: number
        currency:
          type: string
          default: MGA
        bankDetails:
          $ref: '#/components/schemas/BankDetails'
        mobileMoneyDetails:
          $ref: '#/components/schemas/MobileMoneyDetails'

    BankDetails:
      type: object
      properties:
        bankName:
          type: string
        rib:
          type: string
          pattern: '^[0-9]{23}$'

    MobileMoneyDetails:
      type: object
      properties:
        serviceName:
          type: string
          enum: [ORANGE_MONEY, MVOLA, AIRTEL_MONEY]
        phoneNumber:
          type: string

    Activity:
      type: object
      properties:
        title:
          type: string
        date:
          type: string
          format: date
        type:
          type: string
          enum: [GENERAL_ASSEMBLY, JUNIOR_TRAINING, EXCEPTIONAL]
        isMandatory:
          type: boolean

    AttendanceRecord:
      type: object
      properties:
        memberId:
          type: integer
        isPresent:
          type: boolean

    StatisticsReport:
      type: object
      properties:
        collectivityId:
          type: integer
        assiduityRate:
          type: number
        feesCoveragePercent:
          type: number
        newMembersCount:
          type: integer